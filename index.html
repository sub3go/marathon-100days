<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="오픈케어 서브3 풀코스 100일 프로젝트">
<meta property="og:description" content="서브3 완주를 위한 100일 훈련 플랜">
<meta property="og:url" content="https://sub3go.github.io/marathon-100days/">
<title>오픈케어 서브3 풀코스 100일 프로젝트</title>
<style>
:root {
  --track-red: #D14A1F;
  --track-red-dim: #7A2F15;
  --ink: #16140F;
  --ink-soft: #5A524A;
  --paper: #F9F6F0;
  --paper-dim: #EFE9DC;
  --lane-gold: #C49A3A;
  --prep-gray: #8A929A;
  --rest-blue: #4A7A96;
  --line: #DFD7C7;
  --display: "Pretendard", "Apple SD Gothic Neo", "Segoe UI", sans-serif;
  --mono: "JetBrains Mono", "SF Mono", monospace;
}
* { box-sizing: border-box; font-family: var(--display); }
body { margin: 0; background: var(--paper); color: var(--ink); -webkit-font-smoothing: antialiased; padding-bottom: 60px; }
.wrap { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }

/* HEADER STYLE */
.header {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: flex-end;
  gap: 20px;
  padding-bottom: 24px;
  border-bottom: 3px solid var(--ink);
  margin-bottom: 24px;
}
.header h1 { font-size: clamp(24px, 4vw, 36px); font-weight: 800; margin: 0 0 8px; letter-spacing: -0.03em; }
.header .sub { font-family: var(--mono); font-size: 14px; color: var(--ink-soft); line-height: 1.5; }
.header .stats { display: flex; gap: 20px; }
.stat { text-align: right; background: var(--paper-dim); padding: 8px 16px; border-radius: 4px; border: 1px solid var(--line); }
.stat .num { font-size: 24px; font-weight: 700; color: var(--track-red); display: block; font-family: var(--mono); }
.stat .lbl { font-size: 11px; color: var(--ink-soft); font-weight: 600; }

/* INTERACTIVE PROGRESS LANE */
.lane-progress {
  position: relative; height: 48px; margin-bottom: 24px; border-radius: 4px; overflow: hidden; background-color: #1A1813;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
}
.lane-progress .seg {
  position: absolute; top: 0; bottom: 0; display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: #fff; font-weight: 600; letter-spacing: 0.05em;
}
.lane-progress .seg.prep { background: rgba(138, 146, 154, 0.5); border-right: 1px dashed rgba(255,255,255,0.3); }
.lane-progress .seg.main { background: rgba(209, 74, 31, 0.6); border-right: 1px dashed rgba(255,255,255,0.3); }
.lane-progress .seg.dday { background: var(--lane-gold); color: var(--ink); font-weight: 700; }

/* LEGEND */
.legend { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 32px; font-size: 13px; color: var(--ink-soft); font-weight: 500; }
.legend .item { display: flex; align-items: center; gap: 6px; }
.legend .dot { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }

/* CALENDAR GRID */
.month { margin-bottom: 40px; background: #fff; padding: 20px; border-radius: 8px; border: 1px solid var(--line); box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
.month-title { font-size: 22px; font-weight: 800; margin: 0 0 16px; color: var(--ink); display: flex; align-items: center; gap: 12px; }
.month-title .badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; color: #fff; }
.bg-prep { background-color: var(--prep-gray); }
.bg-main { background-color: var(--track-red); }
.bg-mixed { background: linear-gradient(90deg, var(--prep-gray) 0%, var(--track-red) 100%); }

.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
.wd { font-size: 12px; font-weight: 700; text-align: center; color: var(--ink-soft); padding: 8px 0; border-bottom: 2px solid var(--paper-dim); }
.wd:first-child { color: var(--track-red); }
.wd:last-child { color: var(--rest-blue); }

.cell {
  position: relative; min-height: 115px; background: var(--paper); border: 1px solid var(--line); border-radius: 4px;
  padding: 8px; cursor: pointer; transition: all 0.15s ease-in-out; display: flex; flex-direction: column; justify-content: space-between;
}
.cell:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(26,24,19,0.1); border-color: var(--ink); z-index: 10; }
.cell.empty { background: transparent; border: none; cursor: default; }
.cell.empty:hover { transform: none; box-shadow: none; }

.cell.p-prep { border-top: 4px solid var(--prep-gray); }
.cell.p-main { border-top: 4px solid var(--track-red); }
.cell.p-rest { border-top: 4px solid var(--rest-blue); background-color: #F0F4F7; }
.cell.p-dday { border-top: 4px solid var(--lane-gold); background-color: #FFF9EB; box-shadow: 0 0 10px rgba(196,154,58,0.15); }

.cell .top-bar { display: flex; justify-content: space-between; align-items: baseline; }
.cell .date-num { font-family: var(--mono); font-weight: 700; font-size: 15px; }
.cell .day-tag { font-size: 10px; font-weight: 700; color: var(--ink-soft); background: var(--paper-dim); padding: 1px 4px; border-radius: 2px; }
.cell .title { font-size: 12px; font-weight: 700; margin-top: 6px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; flex-grow: 1; color: var(--ink); }
.cell .stars { font-size: 9px; color: var(--lane-gold); margin-top: 2px; letter-spacing: -0.5px; }

.cell.today {
  border: 2px solid var(--track-red) !important;
  box-shadow: 0 0 0 3px rgba(209,74,31,0.15);
  position: relative;
}
.cell.today::before {
  content: '오늘';
  position: absolute; top: 4px; right: 5px;
  font-size: 9px; font-weight: 800; color: #fff;
  background: var(--track-red); border-radius: 3px;
  padding: 1px 5px; letter-spacing: 0.05em;
}
.cell.today .date-num { color: var(--track-red); }

.cell.locked {
  background: var(--paper-dim); opacity: 0.45;
  cursor: default; pointer-events: none;
}
.cell.locked:hover { transform: none; box-shadow: none; }
.cell .lock-icon { font-size: 18px; margin-top: 6px; text-align: center; flex-grow: 1; display: flex; align-items: center; justify-content: center; }

.cell .day-of-week { display: none; font-size: 10px; font-weight: 600; margin-left: 2px; }
.cell .text-red { color: #D32F2F; }
.cell .text-blue { color: #1565C0; }

@media (max-width: 640px) {
  .cell .day-of-week { display: inline; }
  .cell.day-sun .date-num,
  .cell.day-sun .day-of-week { color: #D32F2F; }
  .cell.day-sat .date-num,
  .cell.day-sat .day-of-week { color: #1565C0; }
  .cell.day-sun { background: #FFF5F5; }
  .cell.day-sat { background: #F5F8FF; }
}

/* 별 4~5개 강조 */
.cell.high-intensity { background: #FFF8F6; }
.cell.high-intensity.p-main { border-top: 4px solid var(--track-red); box-shadow: 0 0 0 1px rgba(209,74,31,0.15); }
.cell.high-intensity.p-prep { border-top: 4px solid var(--prep-gray); box-shadow: 0 0 0 1px rgba(138,146,154,0.2); }
.cell.high-intensity .intensity-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 9px; font-weight: 800; color: var(--track-red);
  background: rgba(209,74,31,0.1); border: 1px solid rgba(209,74,31,0.25);
  padding: 1px 5px; border-radius: 3px; margin-top: 4px; letter-spacing: 0.03em;
}
.cell .stars { font-size: 9px; color: var(--lane-gold); margin-top: 2px; letter-spacing: -0.5px; }

/* POPUP MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(22,20,15,0.55);
  backdrop-filter: blur(6px); display: none; align-items: center;
  justify-content: center; padding: 20px; z-index: 100;
  opacity: 0; transition: opacity 0.2s ease;
}
.modal-overlay.open { display: flex; opacity: 1; }
.modal-overlay.animating { display: flex; }

.modal {
  background: var(--paper); max-width: 600px; width: 100%; max-height: 90vh;
  overflow-y: auto; border-radius: 12px; border: 2px solid var(--ink);
  padding: 28px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  transform: scale(0.92) translateY(12px);
  transition: transform 0.25s cubic-bezier(0.34, 1.4, 0.64, 1), opacity 0.2s ease;
  opacity: 0;
}
.modal-overlay.open .modal { transform: scale(1) translateY(0); opacity: 1; }

.modal .close-btn {
  position: absolute; top: 14px; right: 14px; background: var(--paper-dim);
  border: 1px solid var(--line); border-radius: 50%; width: 32px; height: 32px;
  font-size: 16px; cursor: pointer; color: var(--ink-soft);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
.modal .close-btn:hover { background: var(--ink); color: #fff; }
.modal .m-date { font-family: var(--mono); font-size: 13px; color: var(--ink-soft); font-weight: 600; }
.modal .m-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; color: #fff; margin: 8px 0; }
.modal h2 { font-size: 20px; font-weight: 800; margin: 4px 0 8px; line-height: 1.3; }
.modal .m-stars { font-size: 15px; color: var(--lane-gold); margin-bottom: 16px; letter-spacing: 1px; }
.modal .m-stars.high { color: var(--track-red); }
.modal .m-stars.high::after { content: ' HIGH INTENSITY'; font-size: 10px; font-weight: 800; vertical-align: middle; letter-spacing: 0.08em; }
.modal .m-body {
  font-size: 14px; line-height: 1.7; color: var(--ink);
  background: #fff; border: 1px solid var(--line); border-radius: 8px;
  padding: 16px 18px; white-space: pre-line;
}
.modal .m-body a { color: #0055bb; font-weight: 700; text-decoration: underline; word-break: break-all; }
.modal .m-body a:hover { color: var(--track-red); }
.modal .m-body .highlight-main { color: var(--track-red); font-weight: 700; }
.modal .m-body .highlight-main-start {
  display: block; color: var(--track-red); font-weight: 700;
  white-space: pre-line;
}
.modal .m-body .highlight-guide-start {
  display: block; color: #5C4A00; font-weight: 600;
  background: #FFFBEB; border-left: 3px solid var(--lane-gold);
  padding: 6px 10px; margin: 6px 0; border-radius: 0 4px 4px 0;
  white-space: pre-line;
}
.modal .m-body .pace-tag {
  display: inline-block; font-size: 12px; font-weight: 700;
  color: #993C1D; background: #FFF0ED; border: 1px solid #F0997B;
  border-radius: 4px; padding: 0px 6px; margin-left: 4px;
  vertical-align: middle; white-space: nowrap;
}

/* 모바일 최적화 */
@media (max-width: 640px) {
  .wrap { padding: 16px 12px; }
  .header { flex-direction: column; align-items: flex-start; }
  .header .stats { width: 100%; justify-content: space-between; }
  .stat { flex: 1; text-align: center; padding: 8px 6px; }
  .stat .num { font-size: 20px; }
  .lane-progress { height: 36px; margin-bottom: 16px; }
  .lane-progress .seg { font-size: 9px; }

  /* 모바일: 7열 그리드 → 컴팩트 리스트 뷰 */
  .cal-grid { display: flex; flex-direction: column; gap: 0; }
  .wd { display: none; }
  .cell.empty { display: none; }
  .cell {
    min-height: unset; height: auto;
    display: flex; flex-direction: row; align-items: center;
    padding: 10px 12px; gap: 10px; border-radius: 0;
    border: none; border-bottom: 1px solid var(--line);
    border-left: 4px solid transparent;
  }
  .cell.p-prep { border-left: 4px solid var(--prep-gray); border-top: none; }
  .cell.p-main { border-left: 4px solid var(--track-red); border-top: none; }
  .cell.p-rest { border-left: 4px solid var(--rest-blue); border-top: none; background: #F0F4F7; }
  .cell.p-dday { border-left: 4px solid var(--lane-gold); border-top: none; background: #FFF9EB; }
  .cell.high-intensity { background: #FFF8F6; }
  .cell:hover { transform: none; box-shadow: none; background: var(--paper-dim); }
  .cell .top-bar { flex-direction: column; align-items: center; min-width: 38px; gap: 2px; }
  .cell .date-num { font-size: 16px; font-weight: 800; }
  .cell .day-tag { font-size: 9px; white-space: nowrap; }
  .cell .title { font-size: 13px; -webkit-line-clamp: 2; flex: 1; margin-top: 0; }
  .cell .stars { font-size: 11px; min-width: 40px; text-align: right; }
  .cell .intensity-badge { display: none; }

  .month { padding: 12px 0; border-radius: 0; margin-bottom: 16px; }
  .month-title { font-size: 16px; padding: 0 12px 10px; }

  .modal { padding: 20px 16px; border-radius: 16px 16px 0 0; max-height: 85vh; }
  .modal-overlay { align-items: flex-end; padding: 0; }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }
  .modal { transform: translateY(40px); }
  .modal h2 { font-size: 17px; }
  .modal .m-body { font-size: 13px; padding: 14px; }
}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div>
      <h1>오픈케어 서브3 풀코스 100일 프로젝트</h1>
      <div class="sub">⏱ 최근 1000m: 3분 20초 ➔ 목표 페이스 적응 기반 풀코스 완주 및 PB 단축 (서브3)</div>
    </div>
    <div class="stats">
      <div class="stat"><span class="num">126</span><span class="lbl">총 훈련일</span></div>
      <div class="stat"><span class="num">25</span><span class="lbl">준비 순환(일)</span></div>
      <div class="stat"><span class="num">100</span><span class="lbl">본훈련 카운트</span></div>
    </div>
  </div>

  <div class="lane-progress">
    <div class="seg prep" style="left:0; width:19.8%;">준비 순환 구간 (25일)</div>
    <div class="seg main" style="left:19.8%; width:79.4%;">본프로그램 직진 구간 (100일)</div>
    <div class="seg dday" style="left:99.2%; width:0.8%;">대회</div>
  </div>

  <div class="legend">
    <div class="item"><span class="dot" style="background:var(--prep-gray)"></span>준비 순환 (6/22 ~ 7/16)</div>
    <div class="item"><span class="dot" style="background:var(--track-red)"></span>본훈련 직진 (7/17 ~ 10/24)</div>
    <div class="item"><span class="dot" style="background:var(--rest-blue)"></span>지정 휴식일</div>
    <div class="item"><span class="dot" style="background:var(--lane-gold)"></span>D-DAY 춘천마라톤 (10/25)</div>
  </div>

  <div id="calendarContainer"></div>

</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="close-btn" id="closeBtn">✕</button>
    <div class="m-date" id="mDate"></div>
    <span class="m-badge" id="mBadge"></span>
    <h2 id="mTitle"></h2>
    <div class="m-stars" id="mStars"></div>
    <div class="m-body" id="mBody"></div>
  </div>
</div>

<script>
const CORE_PROGRAM = {
  1: { stars: 4, title: "컨디셔닝 1000m x 7R", summary: "• 기상 후 보강: 상체스트레칭 영상보기 https://cafe.naver.com/teamfca/118466\n• 보강 A: 바디모빌리티A 영상보기 https://cafe.naver.com/teamfca/92592\n• 워밍업: 17분 (1km 페이스 6'00\" ~ 7'00\")\n• 보강 B: 바디모빌리티B 영상보기 https://cafe.naver.com/teamfca/106663\n  => 휴식 5분\n• 메인: 컨디셔닝 1000m (1000m + 휴식 1분 30초) × 7R\n  - 1~6R: 400m 1분 38초\n  - 7R: 400m 1분 34초\n• 가이드: 호흡이 살짝 거칠어지는 80% 페이스. 6R 후 추가 휴식 5분, 이후 7R 수행\n• 에어로빅: 12분 (1km 페이스 6'00\" ~ 7'00\") 에어로빅 설명보기 https://cafe.naver.com/teamfca/104387\n• 쿨다운: 3분 (1km 페이스 8'00\" ~ 9'00\")\n• 스트레칭: 정적스트레칭 영상보기 https://cafe.naver.com/teamfca/114672" },

// 2. 2026년 달력 기반 일정 스케줄 매칭 테이블 생성 자동화
const START_DATE_ISO = "2026-06-22"; // 오늘/시작일
const PREP_END_ISO = "2026-07-16";  // 준비기간 종료일
const MAIN_START_ISO = "2026-07-17"; // 본훈련 시작일 (대회 역산 100일전)
const DDAY_DATE_ISO = "2026-10-25";   // 춘천마라톤 당일

const SCHEDULE = [];
let currentDate = new Date(START_DATE_ISO + 'T00:00:00');
const ddayDate = new Date(DDAY_DATE_ISO + 'T00:00:00');

let prepDayCounter = 1;
let mainDayCounter = 1;

while (currentDate <= ddayDate) {
  const y = currentDate.getFullYear();
  const m = String(currentDate.getMonth() + 1).padStart(2, '0');
  const d = String(currentDate.getDate()).padStart(2, '0');
  const isoStr = `${y}-${m}-${d}`;

  let phase = "main";
  let progDay = 1;

  if (isoStr <= PREP_END_ISO) {
    phase = "prep";
    progDay = prepDayCounter;
    prepDayCounter++;
    if (prepDayCounter > 25) prepDayCounter = 1;
  } else if (isoStr === DDAY_DATE_ISO) {
    phase = "dday";
    progDay = null;
  } else {
    phase = "main";
    progDay = mainDayCounter;
    mainDayCounter++;
  }

  SCHEDULE.push({ date: isoStr, phase: phase, programDay: progDay });
  currentDate.setDate(currentDate.getDate() + 1);
}

const SCHEDULE_MAP = {};
SCHEDULE.forEach(s => SCHEDULE_MAP[s.date] = s);

const WEEKDAYS = ["일", "월", "화", "수", "목", "금", "토"];

// 거리+시간 패턴 감지해서 페이스 자동 계산
function calcPace(distanceM, timeSec) {
  const secPerKm = (timeSec / distanceM) * 1000;
  const min = Math.floor(secPerKm / 60);
  const sec = Math.round(secPerKm % 60);
  return `${min}'${String(sec).padStart(2, '0')}" 페이스`;
}

function injectPace(line) {
  if (line.includes('pace-tag') || line.includes('페이스 유지') || line.includes('페이스)')) return line;

  // 패턴 1: 2'24"/400m 형식
  line = line.replace(/(\d+)'(\d+)"\/(\d+)(m|km)/g, (match, min, sec, dist, unit) => {
    const distM = unit === 'km' ? parseFloat(dist) * 1000 : parseFloat(dist);
    const timeSec = parseInt(min) * 60 + parseInt(sec);
    const pace = calcPace(distM, timeSec);
    return `${match} <span class="pace-tag">${pace}</span>`;
  });

  // 패턴 2: 400m 1분 32초 형식
  line = line.replace(/(\d+(?:\.\d+)?)\s*(m|km)\s*[^0-9\n]{0,20}?(\d+)분\s*(\d+)초/g, (match, dist, unit, min, sec) => {
    if (match.includes('pace-tag')) return match;
    const distM = unit === 'km' ? parseFloat(dist) * 1000 : parseFloat(dist);
    const timeSec = parseInt(min) * 60 + parseInt(sec);
    const pace = calcPace(distM, timeSec);
    return `${match} <span class="pace-tag">${pace}</span>`;
  });

  // 패턴 3: 100m Dash(25.5초) 형식 - 괄호 안, Dash/dash 포함
  line = line.replace(/(\d+(?:\.\d+)?)\s*(m|km)[^\n(]{0,10}[Dd]ash\s*\((\d+(?:\.\d+)?)초\)/g, (match, dist, unit, sec) => {
    if (match.includes('pace-tag')) return match;
    const distM = unit === 'km' ? parseFloat(dist) * 1000 : parseFloat(dist);
    const timeSec = parseFloat(sec);
    const pace = calcPace(distM, timeSec);
    return `${match} <span class="pace-tag">${pace}</span>`;
  });

  // 패턴 4: 100m 조깅(60초) - 조깅은 페이스 표시
  line = line.replace(/(\d+(?:\.\d+)?)\s*(m|km)\s*조깅\s*\((\d+(?:\.\d+)?)초\)/g, (match, dist, unit, sec) => {
    if (match.includes('pace-tag')) return match;
    const distM = unit === 'km' ? parseFloat(dist) * 1000 : parseFloat(dist);
    const timeSec = parseFloat(sec);
    const pace = calcPace(distM, timeSec);
    return `${match} <span class="pace-tag">${pace}</span>`;
  });

  // 패턴 5: 200m 41초, 300m 67초 등 거리+초 (휴식/기준/이상 등 제외)
  line = line.replace(/(\d+(?:\.\d+)?)\s*(m|km)[^0-9\n(휴]{0,15}?(\d+)초(?!\s*페이스)/g, (match, dist, unit, sec) => {
    if (match.includes('pace-tag')) return match;
    if (/휴식|기준|이상|이내|초과|미만|저하/.test(match)) return match;
    const distM = unit === 'km' ? parseFloat(dist) * 1000 : parseFloat(dist);
    const timeSec = parseInt(sec);
    const pace = calcPace(distM, timeSec);
    return `${match} <span class="pace-tag">${pace}</span>`;
  });

  return line;
}

// 텍스트 내 URL을 실제 클릭 가능한 HTML 링크로 파싱하는 정규식 함수 추가
function linkify(text) {
  if (!text) return '';
  const lines = text.split('\n');
  const processed = [];
  let inGuideBlock = false;
  let inMainBlock = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    let result = injectPace(line);
    result = result.replace(/(https?:\/\/[^\s]+)/g, url =>
      `\n<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`
    );

    const trimmed = line.trim();
    const isGuideStart = /^[•]?\s*(가이드|훈련 가이드|훈련가이드)\s*:?\s*$/.test(trimmed);
    const isNumberedSub = /^\d+\.\s/.test(trimmed);
    const isMainStart = /^[•]?\s*(메인|Main)(\s*(A|B|보강|Sub|:))?/.test(trimmed);
    // 메인 블록에 속하는 세부 줄: 대괄호, 하이픈, 들여쓰기(공백)로 시작하거나 화살표
    const isSubDetail = /^[\[\-]|^\s{2,}|^=>/.test(line) || /^[가-힣]+:\s*\d/.test(trimmed) === false && /^(스피드|불완전|조깅|메인|컨디셔닝)/.test(trimmed);
    const isBulletStart = /^•/.test(trimmed);

    if (isGuideStart) {
      if (inMainBlock) { processed[processed.length - 1] += '</span>'; inMainBlock = false; }
      inGuideBlock = true;
      processed.push(`<span class="highlight-guide-start">${result}`);
      continue;
    }
    if (inGuideBlock && isNumberedSub) {
      processed.push(result);
      continue;
    }
    if (inGuideBlock) {
      processed[processed.length - 1] += '</span>';
      inGuideBlock = false;
    }

    if (isMainStart) {
      inMainBlock = true;
      processed.push(`<span class="highlight-main-start">${result}`);
      continue;
    }
    if (inMainBlock && !isBulletStart && line.trim() !== '') {
      processed.push(result);
      continue;
    }
    if (inMainBlock) {
      processed[processed.length - 1] += '</span>';
      inMainBlock = false;
    }

    processed.push(result);
  }
  if (inGuideBlock) {
    processed[processed.length - 1] += '</span>';
  }
  if (inMainBlock) {
    processed[processed.length - 1] += '</span>';
  }
  return processed.join('\n');
}

        '2026-08-15','2026-09-24','2026-09-25','2026-09-26',
        '2026-10-03','2026-10-09','2026-12-25'
      ]);

      const cellDayOfWeek = cellDate.getDay(); // 0=일, 6=토
      const isSun = cellDayOfWeek === 0;
      const isSat = cellDayOfWeek === 6;
      const isHoliday = HOLIDAYS.has(dateISO);
      const dayOfWeekLabel = WEEKDAYS[cellDayOfWeek];

      // 날짜 색상 클래스
      if (isSun || isHoliday) classType += ' day-sun';
      else if (isSat) classType += ' day-sat';

      cell.className = classType;

      if (isLocked) {
        cell.innerHTML = `
          <div class="top-bar">
            <span class="date-num ${isSun || isHoliday ? 'text-red' : isSat ? 'text-blue' : ''}">${dayNum}<span class="day-of-week">${dayOfWeekLabel}</span></span>
            <span class="day-tag">${tagLabel}</span>
          </div>
          <div class="lock-icon">⏳</div>
        `;
      } else {
        cell.innerHTML = `
          <div class="top-bar">
            <span class="date-num ${isSun || isHoliday ? 'text-red' : isSat ? 'text-blue' : ''}">${dayNum}<span class="day-of-week">${dayOfWeekLabel}</span></span>
            <span class="day-tag">${tagLabel}</span>
          </div>
          <div class="title">${dayContent.title}</div>
          ${starText ? `<div class="stars">${starText}</div>` : ''}
          ${isHighIntensity && dayContent.stars === 5 ? '<div class="intensity-badge">🔥 HIGH</div>' : ''}
          ${isHighIntensity && dayContent.stars === 4 ? '<div class="intensity-badge">⚡ KEY</div>' : ''}
        `;
        cell.addEventListener('click', () => openModal(dateISO, entry.phase, entry.programDay, dayContent));
      }
      grid.appendChild(cell);
    }

    monthBlock.appendChild(grid);
    container.appendChild(monthBlock);
  });
}

// 4. 모달 오퍼레이션 함수 컨트롤
function openModal(dateISO, phase, progDay, content) {
  const d = new Date(dateISO + 'T00:00:00');
  const dateStr = `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 (${WEEKDAYS[d.getDay()]})`;
  
  document.getElementById('mDate').textContent = dateStr;
  
  const badgeEl = document.getElementById('mBadge');
  if (phase === 'dday') {
    badgeEl.textContent = '실전 대회';
    badgeEl.style.backgroundColor = 'var(--lane-gold)';
  } else if (phase === 'prep') {
    badgeEl.textContent = `준비 순환기 (${progDay}일차 내용)`;
    badgeEl.style.backgroundColor = 'var(--prep-gray)';
  } else {
    badgeEl.textContent = `오픈케어 본훈련 ${progDay}일차`;
    badgeEl.style.backgroundColor = 'var(--track-red)';
  }

  document.getElementById('mTitle').textContent = content.title;
  const starsEl = document.getElementById('mStars');
  if (content.stars >= 4) {
    starsEl.className = 'm-stars high';
    starsEl.textContent = content.stars ? '★'.repeat(content.stars) + '☆'.repeat(5 - content.stars) : '';
  } else {
    starsEl.className = 'm-stars';
    starsEl.textContent = content.stars ? '난이도: ' + '★'.repeat(content.stars) + '☆'.repeat(5 - content.stars) : '';
  }
  
  // textContent 대신 innerHTML을 사용하고 linkify 함수로 정규식 변환을 적용하여 주소를 링크로 활성화
  document.getElementById('mBody').innerHTML = linkify(content.summary);

  const overlay = document.getElementById('modalOverlay');
  overlay.classList.add('animating');
  requestAnimationFrame(() => {
    overlay.classList.add('open');
  });
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(() => overlay.classList.remove('animating'), 200);
}

document.getElementById('closeBtn').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target.id === 'modalOverlay') closeModal();
});

buildCalendar();
</script>
