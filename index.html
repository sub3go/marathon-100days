.cell { position: relative; min-height: 110px; background: var(--paper); border: 1px solid var(--line); border-radius: 4px; padding: 8px; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; }

.cell.p-main { border-top: 4px solid var(--track-red); }

.modal .m-date { font-size: 14px; color: var(--ink-soft); font-weight: 600; }

const WEEKDAYS = ["일", "월", "화", "수", "목", "금", "토"];
const SCHEDULE = [];

// 날짜 생성기 및 스케줄 맵 생성
let loopDate = new Date(2026, 5, 22); // 6월 22일
const ddayDate = new Date(2026, 9, 25);  // 10월 25일
let prepCounter = 1, mainCounter = 1;

while (loopDate <= ddayDate) {
  const y = loopDate.getFullYear(), m = loopDate.getMonth() + 1, d = loopDate.getDate();
  const iso = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  let phase = "main", progDay = 1;

  if (m === 6 || (m === 7 && d <= 16)) {
    phase = "prep"; progDay = prepCounter; prepCounter = (prepCounter % 25) + 1;
  } else if (m === 10 && d === 25) {
    phase = "dday"; progDay = null;
  } else {
    phase = "main"; progDay = mainCounter; mainCounter++;
  }
  SCHEDULE.push({ date: iso, phase: phase, pDay: progDay, y: y, m: m, d: d });
  loopDate.setDate(loopDate.getDate() + 1);
}

const SCHEDULE_MAP = {}; SCHEDULE.forEach(s => SCHEDULE_MAP[s.date] = s);

function linkify(text) {
  if (!text) return '';
  return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

    const block = document.createElement('div'); block.className = 'month';
    
    let badge = mKey === "2026-06" ? '<span class="badge bg-prep">준비 순환기</span>' : (mKey === "2026-10" ? '<span class="badge bg-main">테이퍼링 ➔ 대회</span>' : '<span class="badge bg-main">본훈련 직진구간</span>');
    block.innerHTML = `<h3 class="month-title">${year}년 ${month}월 ${badge}</h3>`;

    const grid = document.createElement('div'); grid.className = 'cal-grid';
    WEEKDAYS.forEach(w => { const cd = document.createElement('div'); cd.className = 'wd'; cd.textContent = w; grid.appendChild(cd); });

    const firstDay = new Date(year, month - 1, 1).getDay();
    const totalDays = new Date(year, month, 0).getDate();

    for (let i = 0; i < firstDay; i++) { const e = document.createElement('div'); e.className = 'cell empty'; grid.appendChild(e); }

    for (let dNum = 1; dNum <= totalDays; dNum++) {
      const iso = `${year}-${String(month).padStart(2,'0')}-${String(dNum).padStart(2,'0')}`;
      const cell = document.createElement('div');
      const entry = SCHEDULE_MAP[iso];

      if (!entry) { cell.className = 'cell empty'; grid.appendChild(cell); continue; }

      let content = {}, cls = "cell ", tag = "";
      if (entry.phase === "dday") {
        content = DDAY_INFO; cls += "p-dday"; tag = "D-DAY";
      } else {
        content = CORE_PROGRAM[entry.pDay] || { t: entry.pDay % 7 === 0 || entry.pDay % 7 === 4 ? "지정 편안한 에어로빅 유지런" : "에어로빅 빌드업 러닝 70분", s: "지정 편안한 에어로빅 크루징 페이스 주행 및 충분한 정적 스트레칭 회복" };
        if (content.t.includes("휴식")) cls += "p-rest";
        else cls += entry.phase === "prep" ? "p-prep" : "p-main";
        tag = entry.phase === "prep" ? `준비 ${entry.pDay}일` : `${entry.pDay}일차`;
      }

      cell.className = cls;
      cell.innerHTML = `<div class="top-bar"><span>${dNum}</span><span class="day-tag">${tag}</span></div><div class="title">${content.t}</div>`;
      cell.addEventListener('click', () => {
        document.getElementById('mDate').textContent = `${year}년 ${month}월 ${dNum}일 (${WEEKDAYS[new Date(year, month-1, dNum).getDay()]})`;
        document.getElementById('mBadge').textContent = entry.phase === 'dday' ? '[대회]' : (entry.phase === 'prep' ? '[준비기]' : `[본훈련 ${entry.pDay}일차]`);
        document.getElementById('mTitle').textContent = content.t;
        document.getElementById('mBody').innerHTML = linkify(content.s);
        document.getElementById('modalOverlay').classList.add('open');
      });
      grid.appendChild(cell);
    }
    block.appendChild(grid); container.appendChild(block);
  });
}

document.getElementById('closeBtn').addEventListener('click', () => document.getElementById('modalOverlay').classList.remove('open'));
document.getElementById('modalOverlay').addEventListener('click', (e) => { if(e.target.id === 'modalOverlay') document.getElementById('modalOverlay').classList.remove('open'); });
buildCalendar();
</script>
</body>
</html>
